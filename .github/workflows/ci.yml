name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: bamara3/devops-project
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Install & Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          pytest tests/ \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --html=reports/test-report.html \
            --self-contained-html \
            -v
        env:
          PYTHONPATH: .

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2 — Linter
  # ─────────────────────────────────────────────
  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          mkdir -p reports
          flake8 app/ tests/ \
            --max-line-length=100 \
            --format=default \
            --output-file=reports/flake8-report.txt \
            --tee || true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: reports/flake8-report.txt

  # ─────────────────────────────────────────────
  # JOB 3 — SAST (Bandit)
  # ─────────────────────────────────────────────
  sast:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          mkdir -p reports
          bandit -r app/ -f json -o reports/bandit-report.json --severity-level medium || true
          bandit -r app/ -f html -o reports/bandit-report.html || true

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-report
          path: reports/

  # ─────────────────────────────────────────────
  # JOB 4 — Docker Build + Trivy Scan
  # ─────────────────────────────────────────────
  docker-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [test, lint, sast]
    # Required to upload scan results to the Security tab
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:scan
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      # Create reports dir before Trivy writes output files
      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Trivy — JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: json
          output: reports/trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Run Trivy — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: sarif
          output: reports/trivy-report.sarif
          exit-code: "0"

      - name: Upload Trivy reports + VEX
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            reports/trivy-report.json
            reports/trivy-report.sarif
            security/vex.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/trivy-report.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 5 — Push sur registry (main uniquement)
  # ─────────────────────────────────────────────
  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [docker-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 6 — Deploy to Railway (CD)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (Railway)
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://devops-project-production-f07e.up.railway.app
    steps:
      - name: Trigger Railway redeploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            https://devops-project-production-f07e.up.railway.app/health
